<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RikkeiMall - Trang chủ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px; /* Bo góc như sở thích của bạn */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Đổ bóng nhẹ */
            display: inline-block;
        }
        h1 { color: #333; }
        .welcome-msg {
            font-size: 24px;
            color: #007bff;
            font-weight: bold;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RikkeiMall</h1>
    <hr>
    <p class="welcome-msg" th:text="${msg}">Lời chào mặc định</p>

    <p>Chúc bạn có trải nghiệm mua sắm tuyệt vời!</p>

    <br>
    <a href="#" class="btn">Xem sản phẩm</a>
</div>

</body>
</html>
